<!-- @dsCard group="Brand" viewport="700x170" subtitle="Lucide, trait 2px, currentColor" name="Iconographie" -->
<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-ui);color:var(--ink-900)}</style></head><body>
<div style="display:flex;gap:24px;padding:24px 20px;align-items:flex-start;flex-wrap:wrap">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="bell" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">alerte</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="calendar-clock" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">échéance</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="percent" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">taux</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="file-check" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">certificat</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="scale" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">concurrence</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="eye" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">transparence</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:70px"><i data-lucide="house" style="width:24px;height:24px;color:var(--green-700)"></i><span style="font:var(--text-body-sm);color:var(--text-muted)">bien</span></div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body></html>
