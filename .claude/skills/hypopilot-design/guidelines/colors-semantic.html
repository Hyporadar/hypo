<!-- @dsCard group="Colors" viewport="700x190" subtitle="Ambre = alerte utile, jamais décoratif" name="Couleurs · Ambre & sémantique" -->
<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-ui);background:var(--surface)}</style></head><body>
<div style="display:flex;gap:12px;padding:20px 20px 8px">
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--amber-700)"></div><div style="font:var(--text-data-sm);margin-top:6px">amber-700</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--amber-600)"></div><div style="font:var(--text-data-sm);margin-top:6px">amber-600</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--amber-500)"></div><div style="font:var(--text-data-sm);margin-top:6px">amber-500</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--amber-100)"></div><div style="font:var(--text-data-sm);margin-top:6px">amber-100</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--success)"></div><div style="font:var(--text-data-sm);margin-top:6px">success</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--warning)"></div><div style="font:var(--text-data-sm);margin-top:6px">warning</div></div>
  <div style="flex:1"><div style="height:56px;border-radius:10px;background:var(--error)"></div><div style="font:var(--text-data-sm);margin-top:6px">error</div></div>
</div>
<div style="padding:4px 20px 16px;font:var(--text-body-sm);color:var(--text-muted)">L'ambre signale la fenêtre 12–18 mois et les échéances. Max 1 accent ambre par écran.</div>
</body></html>
