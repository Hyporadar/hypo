<!doctype html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-ui)}</style></head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px">
  <div style="background:var(--paper);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;height:90px">
    <span style="font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:-0.02em"><span style="color:var(--ink-900)">Hypo</span><span style="color:var(--green-600)">Pilot</span></span>
  </div>
  <div style="background:var(--green-700);border-radius:12px;display:flex;align-items:center;justify-content:center;height:90px">
    <span style="font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:-0.02em"><span style="color:var(--text-on-dark)">Hypo</span><span style="color:var(--green-200)">Pilot</span></span>
  </div>
</div>
<div style="padding:0 16px 16px;font:var(--text-body-sm);color:var(--text-muted)">Bricolage Grotesque 700, letter-spacing −0.02em. « Hypo » encre / « Pilot » vert-600 ; sur fond sombre : clair / vert-200. Taille min 20px. Zone de protection : hauteur du « H » de chaque côté. Jamais d'autre couleur, jamais d'italique, jamais d'espace entre les deux mots.</div>
</body></html>
