<!-- @dsCard group="Components" viewport="700x330" subtitle="Card, Badge, Tag, Wordmark" name="Affichage" -->
<!doctype html><html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../../hp-preview.js" data-root="../../"></script>
<style>body{margin:0;font-family:var(--font-ui);background:var(--paper)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
let NS = null;
function Demo() {
  if (!NS) return <div style={{padding:20}}>Bundle non compilé.</div>;
  const { Card, Badge, Tag, Wordmark } = NS;
  return (
    <div style={{display:'flex', flexDirection:'column', gap:14, padding:20}}>
      <div style={{display:'flex', gap:14}}>
        <Card style={{flex:1}}>
          <div style={{font:'var(--text-overline)', letterSpacing:'.08em', textTransform:'uppercase', color:'var(--text-muted)'}}>Taux actuel</div>
          <div style={{font:'var(--text-data-lg)', marginTop:8}}>1,42&nbsp;%</div>
        </Card>
        <Card tone="alert" style={{flex:1}}>
          <Badge tone="warning">Échéance proche</Badge>
          <div style={{font:'var(--text-body-md)', marginTop:10}}>Votre fenêtre de renégociation s'ouvre dans <b style={{fontFamily:'var(--font-mono)'}}>2 mois</b>.</div>
        </Card>
        <Card tone="brand" style={{flex:1}}>
          <Wordmark onDark size={22} />
          <div style={{font:'var(--text-body-sm)', opacity:.8, marginTop:10}}>Carte de marque — vert-700.</div>
        </Card>
      </div>
      <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
        <Badge tone="success">Surveillée</Badge>
        <Badge tone="neutral">En attente</Badge>
        <Badge tone="error">Document manquant</Badge>
        <span style={{width:16}}></span>
        <Tag selected>Banques</Tag>
        <Tag>Assurances</Tag>
        <Tag>Caisses de pension</Tag>
      </div>
    </div>
  );
}
window.__HP_NS.then((ns) => { NS = ns; ReactDOM.createRoot(document.getElementById('root')).render(<Demo />); });
</script>
</body></html>
