<!doctype html><html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../../hp-preview.js" data-root="../../"></script>
<style>body{margin:0;font-family:var(--font-ui);background:var(--surface)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
let NS = null;
function Demo() {
  if (!NS) return <div style={{padding:20}}>Bundle non compilé.</div>;
  const { Tabs } = NS;
  const [tab, setTab] = React.useState('Mon hypothèque');
  return (
    <div style={{padding:20}}>
      <Tabs tabs={["Mon hypothèque","Offres","Documents","Réglages"]} value={tab} onChange={setTab} />
      <div style={{padding:'16px 4px', font:'var(--text-body-md)', color:'var(--text-muted)'}}>Contenu : {tab}</div>
    </div>
  );
}
window.__HP_NS.then((ns) => { NS = ns; ReactDOM.createRoot(document.getElementById('root')).render(<Demo />); });
</script>
</body></html>
